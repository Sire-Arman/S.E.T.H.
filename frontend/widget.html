<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SETH — Voice Assistant</title>
  <meta name="description" content="SETH AI voice assistant widget with wake word detection" />
  <link rel="stylesheet" href="widget.css" />
</head>
<body>

  <!-- FAB (Floating Action Button) -->
  <button id="widget-fab" aria-label="Open SETH assistant">
    <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3zm6 9a1 1 0 0 0-2 0 4 4 0 0 1-8 0 1 1 0 0 0-2 0 6 6 0 0 0 5 5.91V20H8a1 1 0 0 0 0 2h8a1 1 0 0 0 0-2h-3v-3.09A6 6 0 0 0 18 11z"/></svg>
  </button>

  <!-- Panel -->
  <div id="widget-panel" class="hidden">

    <!-- Header -->
    <div class="widget-header">
      <div class="avatar">S</div>
      <div class="info">
        <div class="name">SETH</div>
        <div class="status-text">
          <span class="dot" id="status-dot"></span>
          <span id="status-label">Disconnected</span>
        </div>
      </div>
      <div class="header-actions">
        <!-- Wake word toggle -->
        <button class="header-btn" id="wake-btn" title='Wake word OFF'>
          <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.24 4.24 0 0 0-6 0zm-4-4l2 2a7.07 7.07 0 0 1 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        </button>
        <!-- Minimize -->
        <button class="header-btn" id="minimize-btn" title="Minimize">
          <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
        </button>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="widget-chat" id="chat-area">
      <div class="chat-empty" id="chat-empty">
        <div class="logo">S</div>
        <div>Hi, I'm <strong>SETH</strong></div>
        <div>Type a message or tap the mic</div>
        <div style="font-size:11px;margin-top:4px;opacity:0.6">Say <em>"hey SETH"</em> to wake me up</div>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator hidden" id="typing-indicator">
      <span></span><span></span><span></span>
    </div>

    <!-- Waveform (speaking state) -->
    <div class="waveform hidden" id="waveform">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Bottom Bar -->
    <div class="widget-bottom">
      <div class="input-row">
        <button class="mic-btn" id="mic-btn" disabled title="Hold to record">
          <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3zm6 9a1 1 0 0 0-2 0 4 4 0 0 1-8 0 1 1 0 0 0-2 0 6 6 0 0 0 5 5.91V20H8a1 1 0 0 0 0 2h8a1 1 0 0 0 0-2h-3v-3.09A6 6 0 0 0 18 11z"/></svg>
        </button>
        <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off" />
        <button class="send-btn" id="send-btn" disabled title="Send message">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

  </div>

  <script src="widget.js"></script>
</body>
</html>
